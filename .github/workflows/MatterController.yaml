name: Matter Controller
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt update
      - run: > 
         sudo apt install -y git gcc g++ pkg-config cmake curl libssl-dev libdbus-1-dev 
         libglib2.0-dev libavahi-client-dev ninja-build python3-venv python3-dev 
         python3-pip unzip libgirepository1.0-dev libcairo2-dev libreadline-dev 
         libevent-dev default-jre
      - run: git clone --depth=1 git@github.com:project-chip/connectedhomeip.git
      - run: cd connectedhomeip
      - run: ./scripts/checkout_submodules.py --shallow --platform  linux
      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: blob
          path: foo